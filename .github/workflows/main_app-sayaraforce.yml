name: Deploy Laravel to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, bcmath, gd, curl, zip, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Create Laravel directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p bootstrap/cache

      - name: Install PHP dependencies
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-interaction \
            --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Remove stale frontend build
        run: rm -rf public/build

      - name: Build frontend assets
        run: npm run build

      - name: Verify frontend build
        run: |
          test -f public/build/manifest.json

          echo "=== Vite manifest ==="
          cat public/build/manifest.json

          echo "=== Verify latest Inbox UI ==="
          grep -R -F "Connected WhatsApp Channel" public/build/assets \
            || {
              echo "ERROR: Latest Inbox UI was not found in built assets."
              exit 1
            }

      - name: Prepare Laravel application
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          rm -f .env

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "release.zip" \
            -x "storage/logs/*"

      - name: Verify deployment package
        run: |
          echo "=== public/build files inside ZIP ==="
          unzip -l release.zip | grep "public/build/manifest.json"
          unzip -l release.zip | grep "public/build/assets/"

          echo "=== Azure queue WebJob files inside ZIP ==="
          unzip -l release.zip | grep "App_Data/jobs/continuous/sayaraforce-queue/run.sh"
          unzip -l release.zip | grep "App_Data/jobs/continuous/sayaraforce-queue/settings.job"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-sayaraforce
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: release.zip
